name: Bug Fix Squad — Trigger on Label

on:
  issues:
    types: [labeled]

# FIX 1: Permissões necessárias para comentar na issue
permissions:
  issues: write
  contents: read

jobs:
  trigger-bugfix-squad:
    if: github.event.label.name == 'Bug'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Bug Fix Squad
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY=$(echo '${{ toJson(github.event.issue.body) }}' | sed 's/^"//;s/"$//')
          REPO_URL="${{ github.event.repository.html_url }}"
          REPO_FULL_NAME="${{ github.event.repository.full_name }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"

          # FIX 2: O webhook do ExpxAgents só passa o campo "prompt" para o runner.
          # Todos os dados do bug precisam estar DENTRO do prompt.
          PROMPT=$(cat <<PROMPT_EOF
          Execute the "bugfix-react-express" squad pipeline with the following input data:

          bug_description: Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          repo_url: ${REPO_URL}
          repo_full_name: ${REPO_FULL_NAME}
          issue_number: ${ISSUE_NUMBER}
          issue_url: ${ISSUE_URL}
          github_token: ${{ secrets.EXPXAGENTS_GITHUB_TOKEN }}
          PROMPT_EOF
          )

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{ "prompt": $prompt }')

          HTTP_STATUS=$(curl -s -o /tmp/squad_response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            http://187.127.4.249:3001/api/webhooks/bugfix-react-express)

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/squad_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Falha ao acionar a squad. Status HTTP: $HTTP_STATUS"
            exit 1
          fi

      - name: Comment on Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Bug Fix Squad Acionada\n\nA squad **Bug Fix — React & Express** foi iniciada automaticamente para analisar e corrigir este bug.\n\n**O que acontece agora:**\n1. **Marcos Vieira** está analisando a descrição do problema\n2. **Diana Costa** irá clonar o repositório e investigar a causa raiz\n3. **Thiago Almeida** irá aplicar a correção\n4. **Camila Ferreira** irá abrir um Pull Request com a correção\n5. **Bruno Saraiva** irá limpar o ambiente temporário\n\nUm PR será aberto automaticamente com a correção. Fique de olho nas notificações!\n\n---\n*Gerado automaticamente pela Squad Bug Fix via ExpxAgents*`
            });

      - name: Comment on Issue (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Falha ao Acionar a Squad\n\nHouve um problema ao contatar o servidor ExpxAgents.\n\nPor favor, verifique se o servidor está online e tente novamente removendo e readicionando a label **Bug**.\n\n---\n*ExpxAgents Bug Fix Squad*`
            });
